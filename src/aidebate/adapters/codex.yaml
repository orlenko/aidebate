name: codex
cmd: "codex --dangerously-bypass-approvals-and-sandbox"
submit_key: "Enter"
submit_delay: 1.0
permission_prompts:
  - { match: "Do you trust",            respond: "" }
  - { match: "Press enter to continue", respond: "" }
  - { match: "\\[y/N\\]",               respond: "y" }
  - { match: "\\(y/n\\)",               respond: "y" }
  - { match: "Allow",                   respond: "y" }
  - { match: "Approve",                 respond: "y" }
startup_keys:
  - { delay: 3.0, key: "Enter" }
answer_instruction: |
  IMPORTANT: When you have finished this task, write your full response
  to this file (the path may contain spaces — preserve it exactly):

      {answer_path}

  Then signal completion by running this command verbatim (including
  the single quotes — they protect any spaces in the path):

      touch '{done_path}'

  Do not print the answer to this terminal. Do not proceed past this
  task until both files exist on disk. After touching the done file,
  you may stop.
