name: claude
cmd: "claude --dangerously-skip-permissions"
submit_key: "Enter"
permission_prompts:
  # Claude Code's "Do you trust the files in this folder?" dialog is
  # radio-style with option 1 ("Yes, proceed") highlighted by default.
  # An empty respond means "just press Enter" — accepts the highlight.
  - { match: "Do you trust",       respond: "" }
  - { match: "Trust this folder",  respond: "" }
  - { match: "Allow edits to",     respond: "y" }
  - { match: "\\[y/N\\]",          respond: "y" }
  - { match: "\\(y/n\\)",          respond: "y" }
# Claude Code pops a trust dialog on first use of an unfamiliar path
# (e.g. ~/Library/Application Support/aidebate/sessions/...). Our
# permission-prompt scanner catches it too, but a proactive Enter at t≈3s
# covers the window between CLI launch and the scanner's first pass.
startup_keys:
  - { delay: 3.0, key: "Enter" }
answer_instruction: |
  IMPORTANT: When you have finished this task, write your full response
  to this file (the path may contain spaces — preserve it exactly):

      {answer_path}

  Then signal completion by running this command verbatim (including
  the single quotes — they protect any spaces in the path):

      touch '{done_path}'

  Do not print the answer to this terminal. Do not proceed past this
  task until both files exist on disk. After touching the done file,
  you may stop.
